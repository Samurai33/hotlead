name: hotlead

services:

  # --- Backend API -----------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    env_file: .env
    # Reachable via the reverse proxy on the internal network — no host port
    # binding (avoids "port already allocated" on a shared Coolify host and
    # keeps routing through Traefik). Local host access: docker-compose.override.yml.
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal
      - coolify   # Traefik lives here; api needs it so the proxy can route to it
    # The container sits on multiple networks; without this Traefik picks an
    # arbitrary one and may route to an IP it can't reach (intermittent 000s).
    labels:
      - traefik.docker.network=coolify
    # Security: read-only root filesystem
    read_only: false
    tmpfs:
      - /tmp
    # Resource limits live here (not in the prod overlay) because Coolify's
    # Docker Compose buildpack deploys from this single file.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  # --- Celery Worker ---------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=${CELERY_WORKERS:-2}
      --queues=scraping
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    # Shares the backend image, whose Dockerfile HEALTHCHECK curls :8000/health.
    # This is a Celery worker with no HTTP server, so that check always fails —
    # disable it (restart:unless-stopped still recovers a dead process).
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 512M

  # --- Celery Beat (periodic cleanup tasks) ----------------------------------
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    # Beat writes its schedule DB + pidfile to CWD by default, but /app is
    # root-owned and the container runs as non-root (appuser) — so it can't
    # create files there. Point both at /tmp (writable) to avoid a crash-loop.
    command: >
      celery -A app.workers.celery_app beat --loglevel=info
      --schedule=/tmp/celerybeat-schedule
      --pidfile=/tmp/celerybeat.pid
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    # Same inherited-HTTP-healthcheck problem as the worker — beat has no
    # HTTP server. Disable it; restart:unless-stopped still recovers a crash.
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  # --- Frontend --------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time: baked into the client bundle (Next.js NEXT_PUBLIC_*).
        # Must be the PUBLIC https URL of the API, reachable from the browser.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    env_file: .env
    # Reachable via the reverse proxy on the internal network — no host port
    # binding. Local host access: docker-compose.override.yml.
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
      - coolify   # Traefik lives here; frontend needs it so the proxy can route to it
    # Same as api: pin the network Traefik uses to reach this container.
    labels:
      - traefik.docker.network=coolify
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M

  # --- PostgreSQL ------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      # Unique alias: api/worker/beat reach the DB via `hotlead-postgres`, which
      # can't collide with a bare `postgres` from another app on the shared
      # coolify network (the api is attached to both networks).
      internal:
        aliases:
          - hotlead-postgres
    deploy:
      resources:
        limits:
          memory: 512M
    # Security: never expose postgres port to host in production
    # Uncomment ONLY for local debugging:
    # ports:
    #   - "127.0.0.1:5432:5432"

  # --- Redis -----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      # Unique alias — see the postgres note above. Reached as `hotlead-redis`.
      internal:
        aliases:
          - hotlead-redis
    deploy:
      resources:
        limits:
          memory: 256M
    # Security: never expose redis port to host
    # ports:
    #   - "127.0.0.1:6379:6379"

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local

networks:
  internal:
    driver: bridge
  # Coolify's Traefik proxy runs on this pre-existing network. api and frontend
  # join it so the proxy can reach them to serve their domains. Postgres, redis,
  # worker and beat stay off it (internal-only, no public domain).
  coolify:
    external: true
