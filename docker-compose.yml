name: hotlead

services:

  # --- Backend API -----------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    env_file: .env
    # Reachable via the reverse proxy on the internal network — no host port
    # binding (avoids "port already allocated" on a shared Coolify host and
    # keeps routing through Traefik). Local host access: docker-compose.override.yml.
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal
    # Security: read-only root filesystem
    read_only: false
    tmpfs:
      - /tmp

  # --- Celery Worker ---------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=${CELERY_WORKERS:-2}
      --queues=scraping
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # --- Celery Beat (periodic cleanup tasks) ----------------------------------
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # --- Frontend --------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time: baked into the client bundle (Next.js NEXT_PUBLIC_*).
        # Must be the PUBLIC https URL of the API, reachable from the browser.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    env_file: .env
    # Reachable via the reverse proxy on the internal network — no host port
    # binding. Local host access: docker-compose.override.yml.
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # --- PostgreSQL ------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal
    # Security: never expose postgres port to host in production
    # Uncomment ONLY for local debugging:
    # ports:
    #   - "127.0.0.1:5432:5432"

  # --- Redis -----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - internal
    # Security: never expose redis port to host
    # ports:
    #   - "127.0.0.1:6379:6379"

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local

networks:
  internal:
    driver: bridge
