name: Deploy

# Triggers the Coolify deploy webhook after CI passes on main.
# Setup: create the secret COOLIFY_WEBHOOK_URL in the repo settings
# (Coolify → resource → Webhooks → copy the deploy URL).

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Trigger Coolify deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Call Coolify webhook
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::warning::COOLIFY_WEBHOOK_URL secret not set — skipping deploy."
            exit 0
          fi
          curl --fail --silent --show-error --request GET "$WEBHOOK_URL"
          echo "Deploy triggered."
