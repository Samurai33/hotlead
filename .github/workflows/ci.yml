name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint, type-check, tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hotlead
          POSTGRES_PASSWORD: hotlead
          POSTGRES_DB: hotlead_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Ruff lint
        working-directory: backend
        run: ruff check app/ tests/

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check app/ tests/

      - name: Mypy type check
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

      - name: Tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://hotlead:hotlead@localhost:5432/hotlead_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
          API_KEY: ci-test-api-key
          POSTGRES_USER: hotlead
          POSTGRES_PASSWORD: hotlead
          POSTGRES_DB: hotlead_test
        run: pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml

  frontend:
    name: Frontend — lint, type-check, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t hotlead-api:test

      - name: Build frontend image
        run: docker build ./frontend -t hotlead-frontend:test
