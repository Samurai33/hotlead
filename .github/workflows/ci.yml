name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hotlead
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: hotlead
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Tests
        env:
          DATABASE_URL: postgresql+asyncpg://hotlead:ci_test_password@localhost:5432/hotlead
          TEST_DATABASE_URL: postgresql+asyncpg://hotlead:ci_test_password@localhost:5432/hotlead
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-secret-key-for-testing-only
          API_KEY: ci-api-key-for-testing-only
          POSTGRES_PASSWORD: ci_test_password
          ENVIRONMENT: development
        run: pytest tests/ -v --tb=short -x

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --ignore-scripts

      - name: Build check
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit
