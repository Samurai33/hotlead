name: hotlead

# Production overrides — use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  api:
    restart: always
    environment:
      - LOG_LEVEL=WARNING
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  worker:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
