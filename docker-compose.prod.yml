name: hotlead

# Production overrides for manual VM deploys:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# NOTE: Coolify's Docker Compose buildpack deploys from docker-compose.yml
# ONLY — it never applies this overlay. Anything production-critical
# (resource limits, expose vs ports) must live in docker-compose.yml itself;
# this file carries only restart policy and log-level overrides.

services:
  api:
    restart: always
    environment:
      - LOG_LEVEL=WARNING
      - ENVIRONMENT=production

  worker:
    restart: always

  beat:
    restart: always

  frontend:
    restart: always

  postgres:
    restart: always

  redis:
    restart: always
