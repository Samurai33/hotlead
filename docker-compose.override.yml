name: hotlead

# Local development only.
#
# Docker Compose auto-loads this file on a plain `docker compose up` (no -f
# flags), so local runs get the api and frontend published on the host at
# http://localhost:8000 and http://localhost:3000.
#
# Coolify deploys with an explicit -f pointing at docker-compose.yml only,
# which does NOT include this override — so production never binds host ports
# and routes through the Coolify/Traefik proxy instead (see the `expose`
# blocks in docker-compose.yml).

services:
  api:
    ports:
      - "8000:8000"

  frontend:
    ports:
      - "3000:3000"

networks:
  # The base file marks `coolify` as external (it exists on the Coolify server).
  # Locally that network doesn't exist, so flip it to a throwaway bridge here
  # to keep `docker compose up` working. Coolify ignores this override file.
  coolify:
    external: false
